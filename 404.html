<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f14;--surface:#131920;--border:rgba(255,255,255,0.07);--teal:#00c9a7;--teal2:#008f72;--teal-dim:rgba(0,201,167,0.1);--text:#e8edf2;--text2:#a0b4c8;--muted:#5a6a7a}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;position:relative;overflow:hidden}

/* background atmosphere */
.bg-dots{position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}
.bg-glow{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,201,167,0.06),transparent 70%);z-index:0;pointer-events:none}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(11,15,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:900;color:var(--text);text-decoration:none}.nav-logo span{color:var(--teal)}
.nav-home{padding:0.45rem 1.1rem;border-radius:8px;background:var(--teal);color:#0b0f14;font-size:0.82rem;font-weight:700;text-decoration:none;transition:opacity 0.2s}.nav-home:hover{opacity:0.9}

.content{position:relative;z-index:1;max-width:560px}

/* animated icon */
.err-icon{position:relative;width:120px;height:120px;margin:0 auto 2rem;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ei-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,201,167,0.2);animation:pulse-ring 3s ease-in-out infinite}
.ei-ring:nth-child(2){inset:-12px;border-color:rgba(0,201,167,0.1);animation-delay:0.5s}
.ei-ring:nth-child(3){inset:-24px;border-color:rgba(0,201,167,0.05);animation-delay:1s}
@keyframes pulse-ring{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.05)}}
.ei-center{position:absolute;inset:0;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.ei-number{font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;color:var(--teal)}

h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;line-height:1.1;margin-bottom:0.75rem;letter-spacing:-0.02em}
h1 em{font-style:normal;color:var(--teal)}
p{font-size:0.95rem;color:var(--text2);line-height:1.7;margin-bottom:2.5rem;max-width:420px;margin-left:auto;margin-right:auto}

.nav-links{display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;margin-bottom:3rem}
.nl-link{padding:0.55rem 1.1rem;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:0.82rem;text-decoration:none;transition:all 0.2s}
.nl-link:hover{border-color:rgba(0,201,167,0.3);color:var(--teal)}
.nl-link.primary{background:var(--teal);border-color:var(--teal);color:#0b0f14;font-weight:700}
.nl-link.primary:hover{opacity:0.9}

.tagline{font-size:0.75rem;color:var(--muted)}
.tagline strong{color:var(--teal)}
</style>
</head>
